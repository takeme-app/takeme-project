# Edge Functions chamadas durante o cadastro/login sem sessão de usuário.
# Sem verify_jwt = false, o gateway retorna 401 ao invocar com anon key.
# Segurança: as funções validam os dados no body (email, código, etc.).

[functions.send-email-verification-code]
verify_jwt = false

[functions.verify-email-code]
verify_jwt = false

[functions.complete-password-reset]
verify_jwt = false

[functions.send-welcome-email]
verify_jwt = false

# Cartão/Stripe: gateway não repassa Authorization; a função valida o JWT com getClaims().
[functions.save-payment-method]
verify_jwt = false

[functions.ensure-stripe-customer]
verify_jwt = false

[functions.charge-booking]
verify_jwt = false

[functions.charge-shipments]
verify_jwt = false

[functions.charge-excursion-request]
verify_jwt = false

[functions.refund-shipment-no-driver]
verify_jwt = false

# Motorista inicia viagem: estorna pedidos cancelados pelo trigger (JWT validado na função).
[functions.refund-journey-start-not-accepted]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.stripe-connect-link]
verify_jwt = false

[functions.stripe-connect-bridge]
verify_jwt = false

[functions.stripe-connect-sync]
verify_jwt = false

[functions.process-refund]
verify_jwt = false

# Liberação de payouts: gateway não aceita ES256; a função valida service_role ou admin (getUser + worker_profiles).
[functions.process-payouts]
verify_jwt = false

[functions.expire-assignments]
verify_jwt = false

# Cópia dos dados (LGPD): gateway não valida ES256; a função valida com getClaims() + getUserById.
[functions.request-data-export]
verify_jwt = false

# Exclusão de conta: cliente envia JWT; a função valida sessão e remove storage + Stripe + auth user.
[functions.delete-account]
verify_jwt = false

# Webhook em public.notifications → envia FCM (validar x-webhook-secret se NOTIFICATION_FCM_WEBHOOK_SECRET estiver definido).
[functions.dispatch-notification-fcm]
verify_jwt = false
